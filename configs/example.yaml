run_name: "my_first_eval"

models:
  - name: "Claude Haiku"
    provider: "anthropic"
    model_id: "claude-3-5-haiku-20241022"
    temperature: 0.0
    max_tokens: 256

  - name: "GPT-4o Mini"
    provider: "openai"
    model_id: "gpt-4o-mini"
    temperature: 0.0
    max_tokens: 256

dataset:
  path: "data/sample.jsonl"
  source: "jsonl"
  max_samples: 10
  input_column: "question"
  reference_column: "answer"

metrics:
  rouge: true
  bleu: true
  semantic_similarity: true
  faithfulness: true
  llm_judge: false

concurrency: 3
output_dir: "results"

prompt_template: |
  Answer the following question concisely and accurately.

  Question: {input}
  Answer:
